<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <title>BoxAgent</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.themes.css">
  <script src="theme.js"></script>
</head>
<body>
  <aside id="sidebar">
    <nav class="side-nav">
      <button id="menu-close" class="icon-btn" aria-label="Close menu">×</button>
      <a href="/" class="active">Chat</a>
      <a href="events.html">Events</a>
      <a href="schedules.html">Schedules</a>
      <span id="conn-state" class="dot offline" title="Disconnected"></span>
    </nav>

    <section id="recents-section" class="side-section recents">
      <div class="side-row">
        <label class="side-label"><button id="recents-toggle" class="text-btn caret-btn" title="Collapse / expand">▾</button> Recent</label>
        <button id="recents-clear" class="text-btn" title="Clear all recents">clear</button>
      </div>
      <ul id="recents-list"></ul>
    </section>

    <section id="machines-section" class="side-section machines">
      <div class="side-row">
        <label class="side-label"><button id="machines-toggle" class="text-btn caret-btn" title="Collapse / expand">▾</button> Machines</label>
        <span class="row-actions">
          <button id="restart-all" class="text-btn" title="Restart all guest nodes (host stays up)">⟲ all</button>
          <button id="refresh-machines" class="text-btn" title="Refresh">↻</button>
        </span>
      </div>
      <ul id="machine-list"></ul>
    </section>

    <section class="side-section sessions">
      <div class="side-row">
        <label class="side-label">
          Sessions <span id="sessions-of" class="muted"></span>
        </label>
        <button id="new-session" class="text-btn">＋ New</button>
      </div>
      <ul id="session-list"></ul>
      <button id="open-claude-picker" class="text-btn" style="margin-top:8px;align-self:flex-start;">⏱ Resume Claude session…</button>
    </section>

    <footer class="side-foot">
      <span id="conn-label">offline</span>
      <span id="theme-slot"></span>
    </footer>
  </aside>

  <div id="sidebar-resizer" aria-hidden="true"></div>

  <main id="main">
    <header class="top-bar">
      <button id="menu-open" class="icon-btn" aria-label="Open menu">☰</button>
      <div class="title-stack">
        <div id="chat-title">—</div>
        <div id="session-info" class="session-info hidden"></div>
      </div>
      <button id="rename-session" class="icon-btn" aria-label="Rename session" title="Rename">✎</button>
    </header>

    <div id="recap-banner" class="hidden">
      <span class="recap-icon">📌</span>
      <div class="recap-text"></div>
      <button class="recap-close icon-btn" aria-label="Dismiss recap" title="Dismiss">✕</button>
    </div>
    <div id="messages" role="log" aria-live="polite"></div>
    <div id="messages-mask" class="hidden"><div class="spinner"></div></div>

    <form id="composer" autocomplete="off">
      <textarea id="input" rows="1" placeholder="Message…" enterkeyhint="send"></textarea>
      <button id="send" type="submit" aria-label="Send">▲</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

  <div id="claude-picker" class="picker hidden" role="dialog" aria-modal="true">
    <div class="picker-card">
      <header class="picker-head">
        <strong>Resume Claude Session</strong>
        <span id="picker-crumb" class="muted"></span>
        <span class="spacer"></span>
        <button id="picker-back" class="text-btn hidden">← Back</button>
        <button id="picker-close" class="icon-btn" aria-label="Close">×</button>
      </header>
      <div class="picker-body">
        <ul id="picker-projects" class="picker-list"></ul>
        <ul id="picker-sessions" class="picker-list hidden"></ul>
        <div id="picker-preview" class="picker-preview hidden"></div>
      </div>
      <footer class="picker-foot">
        <span id="picker-count" class="muted"></span>
        <span class="spacer"></span>
        <label class="muted" style="display:flex;align-items:center;gap:4px;font-size:12px;">
          <input type="checkbox" id="picker-raw" checked />
          Raw passthrough (no BoxAgent injection)
        </label>
        <button id="picker-cancel" class="text-btn">Cancel</button>
        <button id="picker-resume" class="primary-btn" disabled>Resume</button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
  <script>BoxAgentTheme.mount(document.getElementById("theme-slot"));</script>
</body>
</html>
