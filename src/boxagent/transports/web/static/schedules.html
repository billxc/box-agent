<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxAgent Schedules</title>
<link rel="stylesheet" href="events.css">
<style>
  .schedules-layout {
    display: grid;
    grid-template-columns: 280px 320px 1fr;
    gap: 0;
    height: calc(100vh - 49px);
  }
  .schedules-layout > * { overflow-y: auto; padding: 12px; border-right: 1px solid var(--border); }
  .schedules-layout > :last-child { border-right: none; }
  .sched-item, .run-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .sched-item:hover, .run-item:hover { background: var(--panel); }
  .sched-item.selected, .run-item.selected { background: var(--unread-bg); border-color: var(--accent); }
  .sched-id { font-weight: 600; }
  .sched-meta, .run-meta { color: var(--muted); font-size: 12px; }
  .run-status.OK { color: var(--info); }
  .run-status.ERROR { color: var(--error); }
  .detail-section { margin-bottom: 16px; }
  .detail-section h3 { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-section pre {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; white-space: pre-wrap; word-break: break-word; font-size: 13px;
    max-height: 400px; overflow-y: auto;
  }
  .detail-meta { display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px; font-size: 13px; }
  .detail-meta dt { color: var(--muted); }
  .session-id { font-family: monospace; font-size: 12px; }
  .machine-chip { display: inline-block; padding: 2px 6px; background: var(--panel);
    border-radius: 4px; font-size: 11px; color: var(--muted); margin-left: 4px; }
  .empty { color: var(--muted); padding: 20px; text-align: center; }
  .transcript-msg { margin-bottom: 10px; padding: 8px 10px; border-radius: 6px;
    background: var(--panel); border-left: 3px solid var(--border); }
  .transcript-msg.user { border-left-color: var(--accent); }
  .transcript-msg.assistant { border-left-color: var(--info); }
  .transcript-msg.tool_call { border-left-color: var(--warning); font-family: monospace; font-size: 12px; }
  .transcript-msg.tool_result { border-left-color: var(--debug); font-family: monospace; font-size: 12px; }
  .transcript-role { font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 4px; }
  .transcript-body { white-space: pre-wrap; word-break: break-word; }
  .transcript-toggle { cursor: pointer; color: var(--accent); font-size: 12px; margin-top: 6px;
    background: none; border: none; padding: 0; text-decoration: underline; }
</style>
</head>
<body>
<header class="topbar">
  <div class="title">⏰ Schedules</div>
  <nav class="topnav">
    <a href="/">Chat</a>
    <a href="events.html">Events</a>
    <a href="schedules.html" class="active">Schedules</a>
  </nav>
  <div class="actions">
    <span id="machine-chips"></span>
    <button id="reload">↻</button>
  </div>
</header>

<main class="schedules-layout">
  <section id="schedules-pane">
    <h3 style="font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;">Schedules</h3>
    <div id="schedules-list"></div>
  </section>
  <section id="runs-pane">
    <h3 style="font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;">Runs</h3>
    <div id="runs-list"><div class="empty">Pick a schedule</div></div>
  </section>
  <section id="detail-pane">
    <div id="detail-content"><div class="empty">Pick a run</div></div>
  </section>
</main>

<script src="schedules.js"></script>
</body>
</html>
