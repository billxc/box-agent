<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxAgent Schedules</title>
<link rel="stylesheet" href="events.css">
<link rel="stylesheet" href="events.themes.css">
<script src="theme.js"></script>
<style>
  .schedules-layout {
    display: grid;
    grid-template-columns: 300px 340px 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }
  .schedules-layout > * {
    overflow-y: auto;
    overflow-x: hidden;
    min-height: 0;
    min-width: 0;
    padding: 16px;
    border-right: 1px solid var(--border);
    background: var(--panel);
  }
  .schedules-layout > :last-child { border-right: none; background: var(--bg); }

  .pane-label {
    font: 700 10px/1 var(--mono);
    color: var(--dim);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .pane-label::before { content: "── "; color: var(--border-2); letter-spacing: 0; }

  .sched-item, .run-item {
    padding: 8px 10px 8px 16px;
    cursor: pointer;
    margin-bottom: 3px;
    border: 1px solid var(--border);
    border-left: 2px solid var(--border-2);
    background: var(--bg-2);
    position: relative;
    transition: background 0.08s, border-color 0.08s;
  }
  .sched-item:hover, .run-item:hover {
    background: var(--panel-2);
    border-color: var(--border-2);
  }
  .sched-item.selected, .run-item.selected {
    background: var(--accent-2);
    border-color: var(--accent);
    border-left-color: var(--accent);
  }
  .sched-item.selected::before, .run-item.selected::before {
    content: "▶";
    position: absolute; left: 4px; top: 8px;
    color: var(--accent); font-size: 10px;
  }

  .sched-id {
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    font-size: 13px;
  }
  .sched-meta, .run-meta {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 3px;
  }

  .run-status {
    font: 700 10px/1 var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 2px 6px;
    border: 1px solid currentColor;
    display: inline-block;
  }
  .run-status.OK { color: var(--accent); background: var(--accent-2); }
  .run-status.ERROR { color: var(--error); background: rgba(255,107,107,0.08); }

  .detail-section { margin-bottom: 22px; }
  .detail-section h3 {
    font: 700 10px/1 var(--mono);
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .detail-section h3::before { content: "── "; color: var(--border-2); letter-spacing: 0; }
  .detail-section pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    white-space: pre-wrap;
    word-break: break-word;
    font: 12px/1.55 var(--mono);
    max-height: 400px;
    overflow-y: auto;
    color: var(--text);
  }
  .detail-meta {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 16px;
    font-size: 12px;
    padding: 10px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .detail-meta dt {
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 10px;
    align-self: center;
  }
  .detail-meta dd { color: var(--text); }
  .session-id { font-family: var(--mono); font-size: 11px; color: var(--info); }

  .machine-chip {
    display: inline-block;
    padding: 2px 6px;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    font-size: 10px;
    color: var(--muted);
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .empty {
    color: var(--dim);
    padding: 28px 16px;
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    border: 1px dashed var(--border-2);
  }
  .empty::before { content: "▸ "; color: var(--border-2); }

  .transcript-msg {
    margin-bottom: 10px;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-2);
  }
  .transcript-msg.user        { border-left-color: var(--accent); }
  .transcript-msg.assistant   { border-left-color: var(--info); }
  .transcript-msg.tool_call   { border-left-color: var(--notify); font-family: var(--mono); font-size: 11px; }
  .transcript-msg.tool_result { border-left-color: var(--debug); font-family: var(--mono); font-size: 11px; }

  .transcript-role {
    font: 700 10px/1 var(--mono);
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-bottom: 6px;
  }
  .transcript-role::before { content: "▸ "; color: var(--accent); }
  .transcript-body { white-space: pre-wrap; word-break: break-word; }

  .transcript-toggle {
    cursor: pointer;
    color: var(--accent);
    font: 700 10px/1 var(--mono);
    margin-top: 8px;
    background: none;
    border: 1px solid var(--accent);
    padding: 3px 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .transcript-toggle:hover { background: var(--accent); color: var(--accent-fg); }

  /* Generic dropdown (machine filter) */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border-2);
    padding: 5px 12px;
    cursor: pointer;
    font: 700 11px/1 var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .dropdown-button:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-2);
  }
  .dropdown-menu {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 200px;
    background: var(--panel);
    border: 1px solid var(--accent);
    padding: 6px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 2px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }
  .dropdown-menu[hidden] { display: none; }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    font: 12px/1.4 var(--mono);
    text-transform: none;
    letter-spacing: 0.02em;
    color: var(--text);
    cursor: pointer;
    border: 1px solid transparent;
  }
  .dropdown-item:hover { background: var(--panel-2); border-color: var(--border-2); }
  .dropdown-item input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 12px; height: 12px;
    border: 1px solid var(--border-2);
    background: var(--bg);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .dropdown-item input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .dropdown-item input[type="checkbox"]:checked::after {
    content: "×";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-fg); font-weight: 700; font-size: 11px; line-height: 1;
  }
  :root[data-shape="soft"] .dropdown-button,
  :root[data-shape="soft"] .dropdown-menu { border-radius: 6px; }
  :root[data-shape="soft"] .dropdown-button {
    font: 500 13px/1 var(--body-system);
    text-transform: none; letter-spacing: 0;
  }
  :root[data-shape="soft"] .dropdown-item { font-family: var(--body-system); border-radius: 4px; }
  :root[data-shape="neon"] .dropdown-button { border-radius: 999px; }
  :root[data-shape="neon"] .dropdown-menu { border-radius: 10px; box-shadow: 0 0 30px var(--accent-2); }
</style>
</head>
<body>
<header class="topbar">
  <nav class="topnav">
    <a href="/">Chat</a>
    <a href="events.html">Events</a>
    <a href="schedules.html" class="active">Schedules</a>
    <a href="logs.html">Logs</a>
  </nav>
  <div class="actions">
    <span id="machine-chips"></span>
    <button id="reload">↻ Reload</button>
    <span id="theme-slot"></span>
  </div>
</header>

<main class="schedules-layout">
  <section id="schedules-pane">
    <div class="pane-label">Schedules</div>
    <div id="schedules-list"></div>
  </section>
  <section id="runs-pane">
    <div class="pane-label">Runs</div>
    <div id="runs-list"><div class="empty">Pick a schedule</div></div>
  </section>
  <section id="detail-pane">
    <div id="detail-content"><div class="empty">Pick a run</div></div>
  </section>
</main>

<script src="schedules.js"></script>
<script>BoxAgentTheme.mount(document.getElementById("theme-slot"), { label: false });</script>
</body>
</html>
